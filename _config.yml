# Welcome / intro paragraph displayed in the hero (HTML allowed).
intro: >-
  Welcome! I am a fifth-year Ph.D. candidate in Managerial Economics and
  Strategy at the Robert H. Smith School of Business, University of Maryland.
  I examine how regulations and market structures shape innovation strategies
  in knowledge-intensive industries — including how transparency mandates,
  intellectual property regimes, and venture capital concentration influence
  firms' R&amp;D decisions, from geographic allocation and risk-taking to
  the fundamental choice between novel and incremental innovation.

